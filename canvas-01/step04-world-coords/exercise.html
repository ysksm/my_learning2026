<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Step04 演習: パン & ズームを実装する</title>
<style>
  body { font-family: sans-serif; margin: 20px; background: #eef1f5; }
  canvas { background: #fafbfc; border: 1px solid #999; display: block; cursor: grab; }
  button { margin-bottom: 8px; }
</style>
</head>
<body>
<h1>Step04 演習</h1>
<p>今は固定表示です。TODO を実装してパン & ズームできるようにしてください。</p>
<button id="reset">Reset View</button>
<canvas id="canvas" style="width: 100%; height: 520px;"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const dpr = window.devicePixelRatio || 1;
const rect = canvas.getBoundingClientRect();
canvas.width = rect.width * dpr;
canvas.height = rect.height * dpr;
const W = rect.width, H = rect.height;

const camera = { x: 0, y: 0, zoom: 1 };

// TODO(1): 座標変換関数を実装する
//  screenToWorld: worldX = screenX / zoom + camera.x
//  worldToScreen: screenX = (worldX - camera.x) * zoom
function screenToWorld(sx, sy) {
  return { x: sx, y: sy }; // ← 仮実装。直すこと
}
function worldToScreen(wx, wy) {
  return { x: wx, y: wy }; // ← 仮実装。直すこと
}

// ワールドの中身(ここは完成済み。座標はワールド座標)
const widgets = [
  { x: 50,  y: 50,  w: 200, h: 120, color: '#4a90d9', label: 'A' },
  { x: 350, y: 120, w: 160, h: 160, color: '#5aa05a', label: 'B' },
  { x: 120, y: 300, w: 240, h: 100, color: '#d9782a', label: 'C' },
];

function drawWorld() {
  widgets.forEach((wg) => {
    ctx.beginPath();
    ctx.roundRect(wg.x, wg.y, wg.w, wg.h, 10);
    ctx.fillStyle = wg.color;
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(wg.label, wg.x + wg.w / 2, wg.y + wg.h / 2);
  });
}

function draw() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  ctx.save();
  // TODO(2): camera を反映する変換を入れる(2行。順番に注意!)
  //  ヒント: scale(zoom) してから translate(-camera.x, -camera.y)

  drawWorld();
  ctx.restore();

  // HUD(完成済み)
  ctx.fillStyle = 'rgba(20,30,40,0.75)';
  ctx.fillRect(10, 10, 300, 28);
  ctx.fillStyle = '#fff';
  ctx.font = '13px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(
    `camera x=${camera.x.toFixed(0)} y=${camera.y.toFixed(0)} zoom=${camera.zoom.toFixed(2)}`,
    20, 24);
}

// TODO(3): パンを実装する
//  - mousedown で isPanning = true、mouseup(window側)で false
//  - mousemove 中、isPanning なら camera.x -= e.movementX / camera.zoom(y も同様)して draw()
let isPanning = false;

// TODO(4): マウス位置中心のズームを実装する(wheel イベント)
//  手順:
//   1. e.preventDefault()
//   2. before = screenToWorld(e.offsetX, e.offsetY)
//   3. factor = e.deltaY < 0 ? 1.1 : 1/1.1 で camera.zoom を掛け算(0.2〜8 に制限)
//   4. after = screenToWorld(e.offsetX, e.offsetY)
//   5. camera.x += before.x - after.x(y も同様)
//   6. draw()
//  注意: addEventListener の第3引数に { passive: false } を渡すこと

// TODO(5)【発展】: Reset View ボタンで camera を { x:0, y:0, zoom:1 } に戻して draw()

draw();
</script>
</body>
</html>
